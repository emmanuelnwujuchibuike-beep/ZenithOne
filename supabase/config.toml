# ZenithOne Credit Union — Supabase Project Configuration
# https://supabase.com/docs/guides/local-development

[project]
project_id = "meridian-private-bank"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"
buckets = ["avatars", "documents", "statements"]

[auth]
enabled = true
# Site URL for redirect callbacks
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000", "http://localhost:5500"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 12

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_email_change_enabled = true

[auth.sms]
enable_signup = false
enable_confirmations = true

[auth.external.google]
enabled = false

[auth.external.apple]
enabled = false

[functions]
# Edge functions run on Deno
verify_jwt = true

[analytics]
enabled = false
