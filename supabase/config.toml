# ZenithOne Credit Union — Supabase Project Configuration
# https://supabase.com/docs/guides/local-development

project_id = "tfxuhnusogtwqukfypxb"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://localhost"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.avatars]
public = false
file_size_limit = "5MiB"
allowed_mime_types = ["image/*"]

[storage.buckets.documents]
public = false
file_size_limit = "20MiB"

[storage.buckets.statements]
public = false
file_size_limit = "20MiB"

[auth]
enabled = true
site_url = "http://localhost:5500"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:5500",
  "http://127.0.0.1:5500",
  "http://localhost:5500/src/dashboard.html",
  "http://localhost:5500/src/reset-password.html",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 12

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = false

[auth.external.apple]
enabled = false

# ── Edge Functions ─────────────────────────────────────────────
# All functions require JWT by default; get-public-config is the only public one.

[functions.get-public-config]
verify_jwt = false

[functions.account-summary]
verify_jwt = true

[functions.transfer-funds]
verify_jwt = true

[functions.transaction-history]
verify_jwt = true

[functions.card-operations]
verify_jwt = true

[functions.investment-data]
verify_jwt = true

[functions.admin-data]
verify_jwt = true

[analytics]
enabled = false
